<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Interactive Video Game</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #0a0a0f;
    color: #eee;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
  }
  .stage {
    position: relative;
    width: 100vw;
    height: 100vh;
  }
  video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: #000;
    cursor: pointer;
  }
  /* invisible clickable regions layered on top of the in-video buttons */
  .hotspot {
    position: absolute;
    cursor: pointer;
    background: transparent;
    pointer-events: none;
  }
  .hotspot.active {
    pointer-events: auto;
  }

  .replay {
    position: absolute;
    top: 20px;
    right: 20px;
    padding: 8px 16px;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 8px;
    color: #fff;
    font-size: 13px;
    cursor: pointer;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
    z-index: 10;
  }
  .replay.visible { opacity: 1; pointer-events: auto; }
  .replay:hover { background: rgba(255,255,255,0.15); }

  .start-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    z-index: 20;
    cursor: pointer;
    transition: opacity 0.3s ease;
  }
  .start-overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }
  .start-btn {
    padding: 24px 72px;
    font-size: 28px;
    font-weight: 600;
    letter-spacing: 1px;
    color: #fff;
    background: linear-gradient(135deg, #ff3b7f 0%, #b000ff 100%);
    border: none;
    border-radius: 999px;
    cursor: pointer;
    box-shadow: 0 10px 40px rgba(176, 0, 255, 0.45),
                0 0 0 1px rgba(255,255,255,0.15) inset;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    animation: btnPulse 2.4s infinite ease-in-out;
  }
  .start-btn:hover {
    transform: scale(1.06);
    box-shadow: 0 14px 50px rgba(255, 59, 127, 0.55),
                0 0 0 1px rgba(255,255,255,0.25) inset;
  }
  .start-btn:active { transform: scale(0.98); }
  @keyframes btnPulse {
    0%, 100% { box-shadow: 0 10px 40px rgba(176, 0, 255, 0.45),
                           0 0 0 1px rgba(255,255,255,0.15) inset; }
    50%      { box-shadow: 0 14px 60px rgba(255, 59, 127, 0.7),
                           0 0 0 1px rgba(255,255,255,0.3) inset; }
  }
</style>
</head>
<body>
  <div class="stage">
    <video id="player" playsinline preload="auto"></video>

    <!-- transparent overlays positioned over the two in-video buttons -->
    <div class="hotspot hotspot-a" id="hotspotA" title="和她成为好姐妹"></div>
    <div class="hotspot hotspot-b" id="hotspotB" title="在他酒里偷偷下药"></div>

    <button class="replay" id="replay">Replay</button>

    <div class="start-overlay" id="startOverlay">
      <button class="start-btn" id="startBtn">▶  Start</button>
    </div>

    <audio id="bgmA" preload="auto" src="張紫豪 - 可不可以不希望我的未來不是你只願意和你永遠不分離動態歌詞Lyrics.mp3"></audio>
    <audio id="bgmB" preload="auto" src="张学友 你好毒DJMiko ProgHouse KTV 导唱字幕 备有伴奏视频.mp3"></audio>
  </div>

<script>
  const VIDEOS = {
    intro: "kling_20260422_作品_坐在左边的女的说_v2.mp4",
    // top in-video button (和她成为好姐妹) → two women together path
    a:     "kling_20260422_作品_The_two_wo_5524_0.mp4",
    // bottom in-video button (在他酒里偷偷下药) → the girl path
    b:     "kling_20260422_作品_The_girl_o_5542_0.mp4"
  };

  // button positions as fractions of the rendered video area (left, top, width, height)
  // measured from the intro video's final frame
  const HOTSPOTS = {
    a: { left: 0.150, top: 0.775, width: 0.705, height: 0.080 }, // 和她成为好姐妹
    b: { left: 0.150, top: 0.895, width: 0.705, height: 0.080 }  // 在他酒里偷偷下药
  };

  const player        = document.getElementById("player");
  const replay        = document.getElementById("replay");
  const hotspotA      = document.getElementById("hotspotA");
  const hotspotB      = document.getElementById("hotspotB");
  const bgmA          = document.getElementById("bgmA");
  const bgmB          = document.getElementById("bgmB");
  const startOverlay  = document.getElementById("startOverlay");
  const startBtn      = document.getElementById("startBtn");

  // WeChat's in-app WebView mis-handles seeks into VBR mp3s (the audio plays
  // garbled or cuts out). Detect it so we can fall back to playing from 0.
  const isWeChat = /MicroMessenger/i.test(navigator.userAgent);
  bgmA.volume = 0.7;
  bgmB.volume = 0.7;

  function stopAllBgm() {
    [bgmA, bgmB].forEach(a => { a.pause(); a.currentTime = 0; });
  }

  let stage = "idle"; // idle | intro | choosing | branch

  function loadVideo(src) {
    player.src = src;
    player.load();
  }

  function playIntro() {
    stage = "intro";
    player.muted = false;
    loadVideo(VIDEOS.intro);
    player.loop = true; // loop the intro until user picks an option
    player.play().catch(() => {});
    // arm the hotspots as soon as the intro starts — clickable during playback too
    activateHotspots();
    // replay is always available
    replay.classList.add("visible");
  }

  function activateHotspots() {
    positionHotspots();
    hotspotA.classList.add("active");
    hotspotB.classList.add("active");
  }
  function deactivateHotspots() {
    hotspotA.classList.remove("active");
    hotspotB.classList.remove("active");
  }

  // compute the actual rendered area of the <video> after object-fit: contain,
  // then place each hotspot at the correct percentage inside that area.
  function positionHotspots() {
    const vw = player.videoWidth;
    const vh = player.videoHeight;
    if (!vw || !vh) return;
    const rect = player.getBoundingClientRect();
    const videoAspect = vw / vh;
    const boxAspect   = rect.width / rect.height;

    let renderedW, renderedH, offsetX, offsetY;
    if (videoAspect > boxAspect) {
      renderedW = rect.width;
      renderedH = rect.width / videoAspect;
      offsetX = 0;
      offsetY = (rect.height - renderedH) / 2;
    } else {
      renderedW = rect.height * videoAspect;
      renderedH = rect.height;
      offsetX = (rect.width - renderedW) / 2;
      offsetY = 0;
    }

    for (const [key, el] of [["a", hotspotA], ["b", hotspotB]]) {
      const h = HOTSPOTS[key];
      el.style.left   = (offsetX + renderedW * h.left)   + "px";
      el.style.top    = (offsetY + renderedH * h.top)    + "px";
      el.style.width  = (renderedW * h.width)  + "px";
      el.style.height = (renderedH * h.height) + "px";
    }
  }

  const BGM_A_START = 72; // 1:12
  const BGM_B_START = 64; // 1:04

  function playBranch(key) {
    stage = "branch";
    deactivateHotspots();
    stopAllBgm();
    // pick BGM first, set it playing during this user gesture so iOS permits it
    const bgm = (key === "a") ? bgmA : bgmB;
    const startTime = (key === "a") ? BGM_A_START : BGM_B_START;
    bgm.loop = true;
    // In WeChat, skip the seek — seeking VBR mp3s there produces broken audio.
    try { bgm.currentTime = isWeChat ? 0 : startTime; } catch (e) {}
    bgm.play().catch(() => {});
    // mute the branch video: iOS serializes audio streams, so a loud clip would
    // mute the BGM on mobile. Only the BGM should be heard on branch videos.
    player.muted = true;
    loadVideo(VIDEOS[key]);
    player.loop = true;
    player.play().catch(() => {});
    // looping branch never fires 'ended' — show Replay right away
    replay.classList.add("visible");
  }

  player.addEventListener("click", () => {
    if (stage === "idle") {
      playIntro();
    } else if (player.paused) {
      player.play();
    }
  });

  player.addEventListener("ended", () => {
    if (stage === "intro") {
      stage = "choosing";
      // hotspots are already active from when the intro started
      activateHotspots();
    } else if (stage === "branch") {
      replay.classList.add("visible");
    }
  });

  // keep hotspots aligned as video metadata loads / resizes
  player.addEventListener("loadedmetadata", () => {
    if (stage === "intro" || stage === "choosing") positionHotspots();
  });

  hotspotA.addEventListener("click", () => playBranch("a"));
  hotspotB.addEventListener("click", () => playBranch("b"));

  replay.addEventListener("click", () => {
    stopAllBgm();
    deactivateHotspots();
    playIntro();
  });

  window.addEventListener("resize", () => {
    if (stage === "intro" || stage === "choosing") positionHotspots();
  });

  // iOS requires each <audio> element to be touched inside a user gesture
  // before it will play later. Briefly play+pause both BGM tracks silently
  // during the Start click so they can be started programmatically on branch.
  // Note: iOS Safari ignores programmatic .volume changes — use .muted instead.
  function primeBgm() {
    [bgmA, bgmB].forEach(a => {
      a.muted = true;
      const p = a.play();
      const finish = () => {
        a.pause();
        a.currentTime = 0;
        a.muted = false;
      };
      if (p && typeof p.then === "function") {
        p.then(finish).catch(() => { a.muted = false; });
      } else {
        finish();
      }
    });
  }

  // require an explicit user gesture so audio plays unmuted
  function handleStart() {
    startOverlay.classList.add("hidden");
    primeBgm();
    playIntro();
  }
  startOverlay.addEventListener("click", handleStart);
  startBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    handleStart();
  });
</script>
</body>
</html>
