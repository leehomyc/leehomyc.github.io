name: Update Scholar Metrics

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

jobs:
  update-scholar-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Refresh Scholar metrics
        run: |
          python update_scholar_metrics.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add scholar_metrics.js
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update Scholar metrics [skip ci]" && git push)
